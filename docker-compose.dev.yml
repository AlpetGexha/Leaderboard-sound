services:
  app:
    build:
      dockerfile: Dockerfile.dev
    ports: !override
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ./server.js:/app/server.js
      - ./lib:/app/lib
      - ./config.json:/app/config.json
      - ./sound:/app/sound
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ticket_arena_data:/app/data
      - /app/node_modules
    environment:
      DEV: "1"
    command: ["npm", "run", "dev"]
